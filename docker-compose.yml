version: '3.8'

services:
  db-eccar:
    image: mariadb:10.11
    container_name: eccar-db
    restart: always
    environment:
      - TZ=Asia/Bangkok
      - MARIADB_ROOT_PASSWORD=eccarRootPass5555
      - MARIADB_DATABASE=eccardb
      - MARIADB_USER=eccaruser
      - MARIADB_PASSWORD=eccarpassword
    volumes:
      - /home/nptadmin/docker/eccar-system/db:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "3307:3306"
    networks:
      - eccar-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app-eccar:
    image: node:20-alpine
    container_name: eccar-app
    restart: always
    working_dir: /app
    volumes:
      # ใช้ ${CONTAINER_WORKSPACE} หรือพิมพ์จุดตรง ๆ เพื่อบอก Portainer ให้ผูกโฟลเดอร์ที่ได้มาจาก Git เข้ากับ /app ในคอนเทนเนอร์
      - .:/app
      - /home/nptadmin/docker/eccar-system/uploads:/app/server/uploads
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "8002:8000"
    depends_on:
      - db-eccar
    environment:
      - PORT=8000
      - DB_HOST=db-eccar
      - DB_USER=eccaruser
      - DB_PASSWORD=eccarpassword
      - DB_DATABASE=eccardb
      - DB_PORT=3306
      - JWT_SECRET=eccarSuperSecretKey5555
      - NODE_ENV=production
    # ปรับสคริปต์ให้เปลี่ยนไดเรกทอรีสลับไปรันคำสั่งตามโครงสร้างจริงของคุณ
    command: sh -c "cd /app && npm install && npm install --prefix client && npm run build --prefix client && npm start"
    networks:
      - eccar-network

networks:
  eccar-network:
    name: eccar-prd-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
