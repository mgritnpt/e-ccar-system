version: '3.8'

services:
  db-eccar:
    image: mariadb:10.11
    container_name: eccar-db
    restart: always
    environment:
      - TZ=Asia/Bangkok
      - MARIADB_ROOT_PASSWORD=eccarRootPass5555
      - MARIADB_DATABASE=eccardb
      - MARIADB_USER=eccaruser
      - MARIADB_PASSWORD=eccarpassword
    volumes:
      - /home/nptadmin/docker/eccar-system/db:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "3307:3306"
    networks:
      - eccar-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app-eccar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eccar-app
    restart: always
    volumes:
      - /home/nptadmin/docker/eccar-system/uploads:/app/server/uploads
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "8002:8000"
    depends_on:
      - db-eccar
    environment:
      - PORT=8000
      - DB_HOST=db-eccar
      - DB_USER=eccaruser
      - DB_PASSWORD=eccarpassword
      - DB_DATABASE=eccardb
      - DB_PORT=3306
      - JWT_SECRET=eccarSuperSecretKey5555
      - NODE_ENV=production
    networks:
      - eccar-network

networks:
  eccar-network:
    name: eccar-prd-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
